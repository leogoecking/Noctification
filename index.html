<!doctype html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>Lembretes NOC</title>
  <link rel="stylesheet" href="./assets/styles.css" />
  <link rel="shortcut icon" href="./app/favicon.jpeg" />
</head>
<body>
  <a class="skip-link" href="#main">Pular para o conteúdo</a>

  <div class="app-shell">
    <header class="topbar" role="banner">
      <button id="sidebarToggle" class="icon-btn" type="button" aria-label="Alternar menu lateral" aria-expanded="true">
        ☰
      </button>

      <div class="topbar-title">
        <div class="brand">
          <span class="brand-dot" aria-hidden="true"></span>
          <div>
            <div class="brand-name">Lembretes NOC</div>
            <div id="nextInfo" class="brand-sub">Próximo alerta: —</div>
          </div>
        </div>
      </div>

      <div class="topbar-actions">
        <div id="status" class="status-pill" aria-live="polite">
          Notificação: — • Som: — • Alarme: —
        </div>

        <button id="enableNotifBtn" class="btn btn-secondary" type="button">
          Ativar notificações
        </button>

        <button id="testSoundBtn" class="btn btn-secondary" type="button">
          Testar som
        </button>

        <button id="stopAlarmBtn" class="btn btn-danger" type="button">
          Parar alarme
        </button>

        <button id="themeToggleBtn" class="btn btn-ghost" type="button">
          🌙 Modo escuro
        </button>
      </div>
    </header>

    <aside id="sidebar" class="sidebar" aria-label="Navegação">
      <nav class="nav">
        <a class="nav-link" href="#/dashboard" data-nav="dashboard">Dashboard</a>
        <a class="nav-link" href="#/lista" data-nav="lista">Lista</a>
        <a class="nav-link" href="#/settings" data-nav="settings">Settings</a>
      </nav>

      <div class="sidebar-foot">
        <div class="mini">
          <div class="mini-title">Dica</div>
          <div class="mini-text">Ative notificações e teste o som uma vez.</div>
        </div>
      </div>
    </aside>

    <main id="main" class="content" role="main">
      <div id="viewRoot" class="view-root">
        <!-- views renderizam aqui -->
      </div>
    </main>
  </div>

  <!-- Toast -->
  <div id="msg" class="toast hidden" role="status" aria-live="polite"></div>

  <!-- Hidden file input -->
  <input id="fileInput" type="file" accept="application/json" class="hidden" />

  <!-- Modal -->
  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-card">
      <div class="modal-head">
        <div id="modalTitle" class="modal-title">—</div>
        <button id="modalCloseBtn" class="icon-btn" type="button" aria-label="Fechar modal">✕</button>
      </div>
      <div id="modalBody" class="modal-body"></div>

      <div class="modal-actions">
        <button id="modalAckBtn" class="btn btn-secondary" type="button">ACK</button>
        <button id="modalStopBtn" class="btn btn-secondary" type="button">Parar alarme</button>
        <button id="modalSnoozeBtn" class="btn btn-secondary" type="button">+5m</button>
        <button id="modalDoneBtn" class="btn btn-primary" type="button">Concluir</button>
      </div>

      <div class="modal-foot">
        <div class="hint">ESC ou clique fora para fechar (crítico exige ACK ou Concluir).</div>
      </div>
    </div>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
